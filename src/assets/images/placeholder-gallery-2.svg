<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e0e"/>
      <stop offset="100%" stop-color="#0f4d43"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#2cc295" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g2)"/>
  <rect width="800" height="600" fill="url(#glow2)"/>

  <!-- Abstract trophy / podium composition -->
  <!-- Podium steps -->
  <rect x="300" y="360" width="200" height="120" rx="4" fill="#0d3d34" stroke="#2cc295" stroke-width="1.5" opacity="0.9"/>
  <rect x="150" y="400" width="160" height="80" rx="4" fill="#0a0e0e" stroke="#1a6b5f" stroke-width="1.5" opacity="0.7"/>
  <rect x="490" y="420" width="160" height="60" rx="4" fill="#0a0e0e" stroke="#1a6b5f" stroke-width="1.5" opacity="0.6"/>

  <!-- Gold medal on center podium -->
  <circle cx="400" cy="310" r="35" fill="#0d3d34" stroke="#00e085" stroke-width="2.5"/>
  <circle cx="400" cy="310" r="24" fill="none" stroke="#00e085" stroke-width="1"/>
  <text x="400" y="316" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="600" fill="#00e085" text-anchor="middle">1</text>
  <!-- Ribbon -->
  <line x1="400" y1="275" x2="395" y2="230" stroke="#00e085" stroke-width="2" opacity="0.7"/>
  <line x1="400" y1="275" x2="405" y2="230" stroke="#00e085" stroke-width="2" opacity="0.7"/>
  <ellipse cx="400" cy="228" rx="10" ry="6" fill="#00e085" opacity="0.8"/>

  <!-- Silver medal -->
  <circle cx="230" cy="365" r="28" fill="#0a0e0e" stroke="#b0d4ca" stroke-width="2"/>
  <text x="230" y="372" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="600" fill="#b0d4ca" text-anchor="middle">2</text>

  <!-- Bronze medal -->
  <circle cx="570" cy="385" r="24" fill="#0a0e0e" stroke="#3fb89f" stroke-width="2"/>
  <text x="570" y="391" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="600" fill="#3fb89f" text-anchor="middle">3</text>

  <!-- Diagonal accent lines -->
  <line x1="0" y1="150" x2="800" y2="450" stroke="#0d3d34" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="80" x2="800" y2="380" stroke="#1a6b5f" stroke-width="0.75" opacity="0.25"/>

  <!-- Stars scattered -->
  <g fill="#00e085" opacity="0.3">
    <polygon points="100,80 104,92 116,92 106,100 110,112 100,104 90,112 94,100 84,92 96,92" transform="scale(0.6) translate(100,50)"/>
    <polygon points="650,60 654,72 666,72 656,80 660,92 650,84 640,92 644,80 634,72 646,72" transform="scale(0.5) translate(450,30)"/>
  </g>

  <text x="30" y="560" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" letter-spacing="0.12em" fill="#2cc295" opacity="0.4">COMPETITION · RESULTS</text>
</svg>
