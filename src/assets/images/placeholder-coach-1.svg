<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3d34"/>
      <stop offset="100%" stop-color="#0a0e0e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e085"/>
      <stop offset="100%" stop-color="#2cc295"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <!-- Diagonal accent -->
  <polygon points="0,300 150,400 0,400" fill="#0d3d34" opacity="0.6"/>
  <line x1="0" y1="380" x2="380" y2="0" stroke="#00e085" stroke-width="1" opacity="0.15"/>

  <!-- Fencer silhouette — en garde with foil, facing right -->
  <g fill="#00e085" opacity="0.85">
    <!-- Head -->
    <circle cx="200" cy="85" r="28"/>
    <!-- Mask visor suggestion -->
    <ellipse cx="200" cy="90" rx="20" ry="14" fill="#0d3d34" opacity="0.6"/>
    <!-- Neck -->
    <rect x="192" y="113" width="16" height="18" rx="4"/>
    <!-- Torso — angled forward -->
    <path d="M175 131 L185 210 L215 210 L225 131 Z" rx="6"/>
    <!-- Sword arm extended right -->
    <path d="M215 145 L285 155 L290 150 L284 147 L217 139 Z"/>
    <!-- Foil weapon -->
    <line x1="290" y1="152" x2="360" y2="148" stroke="#00e085" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Guard -->
    <ellipse cx="290" cy="152" rx="8" ry="5" fill="#2cc295"/>
    <!-- Back arm raised -->
    <path d="M183 145 L130 120 L127 125 L130 128 L182 152 Z"/>
    <!-- Front leg -->
    <path d="M207 210 L220 300 L230 300 L230 210 Z" rx="4"/>
    <path d="M220 300 L230 330 L240 330 L232 300 Z"/>
    <!-- Back leg -->
    <path d="M185 210 L165 300 L175 300 L195 210 Z" rx="4"/>
    <path d="M163 300 L158 330 L168 330 L175 300 Z"/>
  </g>

  <!-- Ground line -->
  <line x1="60" y1="340" x2="340" y2="340" stroke="#00e085" stroke-width="1.5" opacity="0.3"/>

  <!-- Corner label -->
  <text x="20" y="380" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="500" letter-spacing="0.12em" fill="#00e085" opacity="0.5">FOIL</text>
</svg>
