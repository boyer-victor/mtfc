<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="g6" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a0e0e"/>
      <stop offset="100%" stop-color="#1a6b5f"/>
    </linearGradient>
    <radialGradient id="glow6" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e085" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g6)"/>
  <rect width="800" height="600" fill="url(#glow6)"/>

  <!-- Tournament / event scene — abstract crowd and strip -->
  <!-- Spectator rows — abstract horizontal bands -->
  <rect x="0" y="0" width="800" height="180" fill="#0d3d34" opacity="0.3"/>
  <g opacity="0.25">
    <rect x="20" y="30" width="760" height="20" rx="3" fill="#1a6b5f"/>
    <rect x="40" y="60" width="720" height="20" rx="3" fill="#16705a"/>
    <rect x="20" y="90" width="760" height="20" rx="3" fill="#1a6b5f"/>
    <rect x="40" y="120" width="720" height="20" rx="3" fill="#16705a"/>
    <rect x="20" y="150" width="760" height="20" rx="3" fill="#1a6b5f"/>
  </g>
  <!-- Crowd dot suggestion -->
  <g fill="#b0d4ca" opacity="0.15">
    <circle cx="80" cy="40" r="5"/> <circle cx="120" cy="40" r="5"/> <circle cx="160" cy="40" r="5"/>
    <circle cx="200" cy="40" r="5"/> <circle cx="240" cy="40" r="5"/> <circle cx="280" cy="40" r="5"/>
    <circle cx="320" cy="40" r="5"/> <circle cx="360" cy="40" r="5"/> <circle cx="400" cy="40" r="5"/>
    <circle cx="440" cy="40" r="5"/> <circle cx="480" cy="40" r="5"/> <circle cx="520" cy="40" r="5"/>
    <circle cx="560" cy="40" r="5"/> <circle cx="600" cy="40" r="5"/> <circle cx="640" cy="40" r="5"/>
    <circle cx="680" cy="40" r="5"/> <circle cx="720" cy="40" r="5"/>
    <circle cx="100" cy="70" r="5"/> <circle cx="140" cy="70" r="5"/> <circle cx="180" cy="70" r="5"/>
    <circle cx="220" cy="70" r="5"/> <circle cx="260" cy="70" r="5"/> <circle cx="300" cy="70" r="5"/>
    <circle cx="340" cy="70" r="5"/> <circle cx="380" cy="70" r="5"/> <circle cx="420" cy="70" r="5"/>
    <circle cx="460" cy="70" r="5"/> <circle cx="500" cy="70" r="5"/> <circle cx="540" cy="70" r="5"/>
    <circle cx="580" cy="70" r="5"/> <circle cx="620" cy="70" r="5"/> <circle cx="660" cy="70" r="5"/>
    <circle cx="700" cy="70" r="5"/>
  </g>

  <!-- Scoreboard -->
  <rect x="240" y="195" width="320" height="80" rx="8" fill="#0a0e0e" stroke="#00e085" stroke-width="1.5" opacity="0.9"/>
  <text x="300" y="225" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="500" letter-spacing="0.1em" fill="#3fb89f" opacity="0.7">METRO TACOMA FC</text>
  <text x="360" y="255" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="600" fill="#00e085" text-anchor="middle" opacity="0.9">5 — 3</text>
  <text x="490" y="225" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="500" letter-spacing="0.08em" fill="#7a7a7a" opacity="0.6" text-anchor="end">VISITOR</text>

  <!-- Two fencers mid-bout under lights -->
  <!-- Left (MTFC green) -->
  <g fill="#00e085" opacity="0.75" transform="translate(240, 310)">
    <circle cx="0" cy="0" r="22"/>
    <ellipse cx="-3" cy="5" rx="16" ry="11" fill="#0a0e0e" opacity="0.5"/>
    <path d="M-12 22 L-18 90 L2 90 L10 22 Z"/>
    <path d="M8 35 L70 48 L72 43 L68 40 L8 27 Z"/>
    <line x1="72" y1="45" x2="140" y2="52" stroke="#00e085" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="72" cy="45" rx="7" ry="5" fill="#2cc295"/>
    <path d="-10 36 L-55 22 L-57 27 L-54 30 L-10 40 Z"/>
    <rect x="-8" y="90" width="10" height="65" rx="4"/>
    <rect x="5" y="90" width="10" height="65" rx="4"/>
  </g>
  <!-- Right (opponent, grey) -->
  <g fill="#7a7a7a" opacity="0.55" transform="translate(560, 315)">
    <circle cx="0" cy="0" r="22"/>
    <ellipse cx="3" cy="5" rx="16" ry="11" fill="#0a0e0e" opacity="0.5"/>
    <path d="M-10 22 L-14 90 L6 90 L12 22 Z"/>
    <path d="-8 35 L-68 48 L-70 43 L-66 40 L-8 27 Z"/>
    <line x1="-70" y1="45" x2="-138" y2="52" stroke="#7a7a7a" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-70" cy="45" rx="7" ry="5" fill="#7a7a7a"/>
    <path d="M10 36 L55 22 L57 27 L54 30 L10 40 Z"/>
    <rect x="-6" y="90" width="10" height="65" rx="4"/>
    <rect x="4" y="90" width="10" height="65" rx="4"/>
  </g>

  <!-- Floor / piste -->
  <rect x="60" y="460" width="680" height="40" rx="3" fill="#0d3d34" opacity="0.4"/>
  <line x1="400" y1="460" x2="400" y2="500" stroke="#00e085" stroke-width="2" opacity="0.6"/>

  <!-- Spotlight beams -->
  <path d="M200 0 L100 460 L300 460 Z" fill="#00e085" opacity="0.015"/>
  <path d="M600 0 L500 460 L700 460 Z" fill="#00e085" opacity="0.015"/>

  <text x="30" y="570" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="500" letter-spacing="0.12em" fill="#00e085" opacity="0.4">TOURNAMENT · EVENT</text>
